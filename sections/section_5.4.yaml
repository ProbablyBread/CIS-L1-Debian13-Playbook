- name: "5.4.1.1-5.4.1.4 Configure Shadow Password Suite Parameters"
  ansible.builtin.lineinfile:
    path: "/etc/login.defs"
    create: true
    owner: root
    group: root
    mode: '0644'
    line: "{{ item.line }}"
    regex: "{{ item.regex }}"
  loop:
    - { line: "PASS_MAX_DAYS  {{ shadow_pass_max_days }}", regex: ^PASS_MAX_DAYS\s+\d+$ }
    - { line: "PASS_MIN_DAYS  {{ shadow_pass_min_days }}", regex: ^PASS_MIN_DAYS\s+\d+$ }
    - { line: "PASS_WARN_AGE  {{ shadow_pass_warn_age }}", regex: ^PASS_WARN_AGE\s+\d+$ }
    - { line: "ENCRYPT_METHOD YESCRYPT", regex: ^ENCRYPT_METHOD\s+.*$ }

- name: "5.4.1.5 Ensure inactive password lock is configured"
  ansible.builtin.lineinfile:
    path: "/etc/default/useradd"
    create: true
    owner: root
    group: root
    mode: '0644'
    line: "INACTIVE={{ shadow_inactive }}"
    regex: ^INACTIVE\s*=\s*-?\d+$

- name: "Ensuring users conform to password expiration policy..."
  ansible.builtin.replace:
    path: "/etc/shadow"
    replace: "{{ item.replace }}"
    regexp: "{{ item.regex }}"
  when: item.condition | default(true)
  loop: 
    - { replace: '\g<1>{{ shadow_pass_min_days }}:{{ shadow_pass_max_days }}:{{ shadow_pass_warn_age }}:{{ shadow_inactive }}\g<2>', regex: '^((?!root)\w+:[^!*:]+:\d*:)\d*:\d*:\d*:\d*(.*)' }
    - { replace: '\g<1>{{ shadow_pass_min_days }}:{{ shadow_pass_max_days }}:{{ shadow_pass_warn_age }}:{{ shadow_inactive }}\g<2>', regex: '^(root:[^!*:]+:\d*:)\d*:\d*:\d*:\d*(.*)', condition: "{{ not(is_root_breakglass | bool) }}" }
  tags: test

- name: "5.4.2.6 Ensure root user umask is configured"
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    create: true
    owner: root
    group: root
    mode: '0644'
    line: "umask 0027"
    regex: ^umask\s+\d{3,4}$
  loop:
    - "/root/.profile"
    - "/root/.bashrc"

- name: "5.4.2.7 Ensure system accounts do not have a valid login shell"
  ansible.builtin.replace:
    path: "/etc/passwd"
    replace: '\g<1>/usr/sbin/nologin'
    regexp: '^([^:]+:x:(10\d|1[1-9]\d|[2-9]\d{2}):\d*:(\w* ?){1,}:.*:).*$'
  tags: test

