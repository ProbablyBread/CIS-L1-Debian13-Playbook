- name: "5.4.1.1-5.4.1.4 Configure Shadow Password Suite Parameters"
  ansible.builtin.lineinfile:
    path: "/etc/login.defs"
    create: true
    owner: root
    group: root
    mode: '0644'
    line: "{{ item.line }}"
    regex: "{{ item.regex }}"
  loop:
    - { line: "PASS_MAX_DAYS  {{ shadow_pass_max_days }}", regex: ^PASS_MAX_DAYS\s+\d+$ }
    - { line: "PASS_MIN_DAYS  {{ shadow_pass_min_days }}", regex: ^PASS_MIN_DAYS\s+\d+$ }
    - { line: "PASS_WARN_AGE  {{ shadow_pass_warn_age }}", regex: ^PASS_WARN_AGE\s+\d+$ }
    - { line: "ENCRYPT_METHOD YESCRYPT", regex: ^ENCRYPT_METHOD\s+.*$ }

- name: "5.4.1.5 Ensure inactive password lock is configured"
  ansible.builtin.lineinfile:
    path: "/etc/default/useradd"
    create: true
    owner: root
    group: root
    mode: '0644'
    line: "INACTIVE=45"
    regex: ^INACTIVE\s*=\s*-?\d+$

- name: "Ensuring users conform to password expiration policy..."
  ansible.builtin.lineinfile:
    path: "/etc/shadow"
    create: false
    owner: root
    group: root
    mode: '0640'
    line: "{{ item.line }}"
    regex: "{{ item.regex }}"
    backrefs: true
  when: item.condition | default(true)
    - { line: "\1{{ shadow_pass_min_days }}:{{ shadow_pass_max_days }}:{{ shadow_pass_warn_age }}:{{ shadow_inactive }}\2", regex: ^((?!root)\w+:[^!*:]+:\d*:)\d*:\d*:\d*:\d*(.*) }
    - { line: "\1{{ shadow_pass_min_days }}:{{ shadow_pass_max_days }}:{{ shadow_pass_warn_age }}:{{ shadow_inactive }}\2", regex: ^(root:[^!*:]+:\d*:)\d*:\d*:\d*:\d*(.*), condition: "{{ not(is_root_breakglass | bool) }}" }
