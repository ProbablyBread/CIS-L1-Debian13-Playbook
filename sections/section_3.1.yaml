- block: 
  - name: "Disabling IPv6 (net.ipv6.conf.all.disable_ipv6)..."
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv6.conf.all.disable_ipv6"
      value: "1"

  - name: "Disabling IPv6 (net.ipv6.conf.default.disable_ipv6)..."
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv6.conf.default.disable_ipv6"
      value: "1"

  when: not (require_ipv6 | bool)

- name: "3.1.2 Ensure wireless interfaces are not available"
  ansible.builtin.include_tasks:
    file: "../tasks/disable_wlan_modules.yaml"
  when: not (require_wlan | bool)

- name: "3.1.3 Ensure bluetooth services are not in use"
  ansible.builtin.include_tasks:
    file: "../templates/mask_stop_service.yaml"
  vars:
    service: "bluetooth.service"
  when: 
    - require_bluetooth | bool
    - not (run_bluetooth | bool)

- name: "Uninstalling bluez..."
  ansible.builtin.apt:
    name: "bluez"
    state: absent
    purge: true
  when: not (require_bluetooth | bool)
