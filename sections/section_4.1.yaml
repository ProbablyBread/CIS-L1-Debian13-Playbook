- block:
  - name: "4.1.1 Ensure ufw is installed"
    ansible.builtin.apt:
      name: "ufw"
      state: present

  - name: "4.1.2 Ensure ufw service is configured"
    ansible.builtin.systemd_service:
      name: "ufw.service"
      enabled: true
      masked: false
      state: started

  - name: "Enabling UFW service and logging..."
    community.general.ufw:
      state: enabled
      logging: 'on'

  - name: "Allowing SSH..."
    community.general.ufw:
      rule: allow
      port: '22'
      proto: tcp
      src: "{{ ufw_ssh_ip }}"
      direction: in
    when: require_ufw_ssh | bool

  - name: "4.1.3 Ensure ufw incoming default is configured"
    community.general.ufw:
      default: "deny"
      direction: incoming

  - name: "4.1.5 Ensure ufw routed default is configured"
    community.general.ufw:
      default: "deny"
      direction: routed
    when: not (require_ufw_routing | bool)

  when: require_ufw | bool
