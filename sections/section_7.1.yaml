- name: "Configure system file and directory access"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: file
  loop:
    - { path: /etc/passwd, owner: root, group: root, mode: '0644' }
    - { path: /etc/passwd-, owner: root, group: root, mode: '0644' }
    - { path: /etc/group, owner: root, group: root, mode: '0644' }
    - { path: /etc/group-, owner: root, group: root, mode: '0644' }
    - { path: /etc/shadow, owner: root, group: root, mode: '0640' }
    - { path: /etc/shadow-, owner: root, group: root, mode: '0640' }
    - { path: /etc/gshadow, owner: root, group: root, mode: '0640' }
    - { path: /etc/gshadow-, owner: root, group: root, mode: '0640' }
    - { path: /etc/shells, owner: root, group: root, mode: '0644' }
    - { path: /etc/opasswd, owner: root, group: root, mode: '0600' }
    - { path: /etc/opasswd-, owner: root, group: root, mode: '0600' }

