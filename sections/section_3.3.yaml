- block:
  - name: "3.3.1.1 Ensure net.ipv4.ip_forward is configured"
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv4.ip_forward"
      value: "0"

  - name: "3.3.1.2 Ensure net.ipv4.conf.all.forwarding is configured"
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv4.conf.all.forwarding"
      value: "0"

  - name: "3.3.1.3 Ensure net.ipv4.conf.default.forwarding is configured"
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv4.conf.default.forwarding"
      value: "0"

  - name: "3.3.1.4 Ensure net.ipv4.conf.all.send_redirects is configured"
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv4.conf.all.send_redirects"
      value: "0"

  - name: "3.3.1.5 Ensure net.ipv4.conf.default.send_redirects is configured"
    ansible.builtin.include_tasks:
      file: "../templates/configure_sysctl_settings.yaml"
    vars:
      setting: "net.ipv4.conf.default.send_redirects"
      value: "0"

  when: not (require_ipv4_forwarding | bool)

