- name: "5.1.1 Ensure access to /etc/ssh/sshd_config is configured"
  ansible.builtin.file:
    path: "/etc/ssh/sshd_config"
    mode: '0600'
    user: root
    group: root

- name: "5.1.1 Ensure access to /etc/ssh/sshd_config.d is configured"
  ansible.builtin.file:
    path: "/etc/ssh/sshd_config.d"
    state: directory
    mode: "u=rwX,g=,o="
    recurse: yes
    user: root
    group: root

- name: "5.1.2 Ensure access to SSH private host key files is configured"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0600'
    user: root
    group: root
  loop:
    - ssh_host_ecdsa_key
    - ssh_host_ed25519_key
    - ssh_host_rsa_key

- name: "5.1.3 Ensure access to SSH public host key files is configured"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0644'
    user: root
    group: root
  loop:
    - ssh_host_ecdsa_key.pub
    - ssh_host_ed25519_key
    - ssh_host_rsa_key
