- name: "6.1.1.1.1 Ensure journald service is active"
  ansible.builtin.systemd_service:
    name: "systemd-journald.service"
    enabled: true
    masked: false
    state: started
  
- block: 
  - name: "6.1.1.1.3/4/5/6 Configure systemd-journald service"
    ansible.builtin.include_tasks:
      file: "../templates/configure_journald.yaml"
    vars:
      section: "Journal"
      option: "{{ item.option }}"
      value: "{{ item.value }}"
    loop:
      - { option: "SystemMaxUse", value: "{{ journald_system_max_use }}" }
      - { option: "SystemKeepFree", value: "{{ journald_system_keep_free }}" }
      - { option: "RuntimeMaxUse", value: "{{ journald_runtime_max_use }}" }
      - { option: "RuntimeKeepFree", value: "{{ journald_runtime_keep_free }}" }
      - { option: "MaxFileSec", value: "{{ journald_max_file_sec }}" }
      - { option: "Storage", value: "persistent" }
      - { option: "Compress", value: "yes" }
      - { option: "ForwardToSyslog", value: "{{ 'yes' if (require_remote_syslog | bool) else 'no' }}" }

  notify: Restart systemd-journald.service

- name: "6.1.3 Ensure access to all logfiles has been configured"
  tags: test
  ansible.builtin.include_tasks:
    file: "../templates/configure_log_perms.yaml"
  vars: 
    path: "{{ param.path | default('/var/log/') }}"
    regex: "{{ param.regex }}"
    owner: "{{ param.owner }}"
    group: "{{ param.group }}"
    mode: "{{ param.mode }}"
  loop:
    - { path: "/var/log/apt", regex: .*, owner: root, group: (root|adm), mode: 0640 }
    - { regex: (lastlog.*|(b|w)tmp.*|README), owner: root, group: (root|utmp), mode: 0664 }
    - { regex: (cloud-init\.log.*|localmessages.*|waagent\.log.*), owner: (root|syslog), group: (root|adm), mode: 0644}
    - { regex: (secure.*|auth\.log|syslog|messages), owner: (root|syslog), group: (root|adm), mode: 0640 }
    - { regex: (.*\.journal~?), owner: root, group: (root|systemd-journal), mode: 0640 }
    - { regex: ^(?!(lastlog.*|(b|w)tmp.*|README|cloud-init\.log.*|localmessages.*|waagent\.log.*|secure.*|auth\.log|syslog|messages|.*\.journal~?)$).*, owner: "", group: "", mode: 0640 }
  loop_control:
    loop_var: param
