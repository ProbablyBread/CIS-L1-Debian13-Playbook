- name: "6.1.1.1.1 Ensure journald service is active"
  ansible.builtin.systemd_service:
    name: "systemd-journald.service"
    enabled: true
    masked: false
    state: started
  
- block: 
  - name: "6.1.1.1.3/4/5/6 Configure systemd-journald service"
    ansible.builtin.include_tasks:
      file: "../templates/configure_journald.yaml"
    vars:
      section: "Journal"
      option: "{{ item.option }}"
      value: "{{ item.value }}"
    loop:
      - { option: "SystemMaxUse", value: "{{ journald_system_max_use }}" }
      - { option: "SystemKeepFree", value: "{{ journald_system_keep_free }}" }
      - { option: "RuntimeMaxUse", value: "{{ journald_runtime_max_use }}" }
      - { option: "RuntimeKeepFree", value: "{{ journald_runtime_keep_free }}" }
      - { option: "MaxFileSec", value: "{{ journald_max_file_sec }}" }
      - { option: "Storage", value: "persistent" }
      - { option: "Compress", value: "yes" }
      - { option: "ForwardToSyslog", value: "{{ 'yes' if (require_remote_syslog | bool) else 'no' }}" }

  notify: Restart systemd-journald.service
