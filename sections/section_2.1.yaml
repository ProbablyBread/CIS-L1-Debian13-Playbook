- name: "2.1.1 Ensure autofs services are not in use"
  ansible.builtin.include_tasks:
    file: "../templates/mask_stop_service.yaml"
  vars:
    service: "autofs.service"
  when:
    - require_autofs | bool
    - not (run_autofs | bool)

- name: "Uninstalling autofs..."
  ansible.builtin.apt:
    name: "autofs"
    state: absent
    purge: true
  when: not (require_autofs | bool) 

