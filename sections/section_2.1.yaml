- name: "Checking if postfix main.cf exists..."
  register: is_postfix
  ansible.builtin.stat:
    path: /etc/postfix/main.cf

- block:
  - name: "Ensuring /var/lib/postfix is owned by postfix..."
    ansible.builtin.file:
      path: "/var/lib/postfix"
      owner: postfix
      group: postfix
      state: directory
      recurse: false
      mode: "u=rwx,g=rx,o=rx"

  - name: "2.1.22 Ensure mail transfer agents are configured for local-only mode"
    ansible.builtin.lineinfile:
      path: "/etc/postfix/main.cf"
      regex: ^\s*inet_interfaces\s+=.*$
      line: "inet_interfaces = loopback-only"
      create: false
      state: present
    when: 
      - not (require_internet_mta | bool)
    notify: Restart postfix.service

  when: is_postfix.stat.exists
