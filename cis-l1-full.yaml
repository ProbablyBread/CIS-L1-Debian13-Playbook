    - name: "2.1.22 Ensure mail transfer agents are configured for local-only mode"
      ansible.builtin.lineinfile:
        path: "/etc/postfix/main.cf"
        regex: ^\s*inet_interfaces\s+=.*$
        line: "inet_interfaces = loopback-only"
        create: false
        state: present
      when: 
        require_internet_mta == "no"
