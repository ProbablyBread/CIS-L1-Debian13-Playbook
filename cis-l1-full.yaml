    - name: "2.1.18 Ensure web proxy server services are not in use"
      ansible.builtin.include_tasks:
        file: "./tasks/mask_stop_service.yaml"
      vars:
        service: "squid.service"
      when:
        - require_proxy == "yes"
        - run_proxy == "no"

    - name: "Uninstalling squid..."
      ansible.builtin.apt:
        name: "squid"
        state: absent
