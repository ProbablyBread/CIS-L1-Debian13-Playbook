- name: CIS Debian Linux 13 (Trixie) Benchmark v1.0 Server L1
  hosts: localhost

  tasks:
    - name: "Loading options..."
      ansible.builtin.include_vars:
        dir: "./options"
        extensions:
          - "yml"
          - "yaml"
      tags: always

    - name: "Asserting options..."
      ansible.builtin.import_tasks:
        file: "./tasks/assert_options.yaml"
      tags: always

    - name: "Section 1.1"
      ansible.builtin.import_tasks:
        file: "./sections/section_1.1.yaml"
      tags:
        - "1.1"

    - name: "Section 1.2"    
      ansible.builtin.import_tasks:
        file: "./sections/section_1.2.yaml"
      tags:
        - "1.2"

    - name: "Section 1.3"
      ansible.builtin.import_tasks:
        file: "./sections/section_1.3.yaml"
      tags:
        - "1.3"
        - "1.4" # 1.4 requires 1.3

    - name: "Section 1.4"
      ansible.builtin.import_tasks:
        file: "./sections/section_1.4.yaml"
      tags:
        - "1.4"
    
    - name: "Section 1.5"
      ansible.builtin.import_tasks:
        file: "./sections/section_1.5.yaml"
      tags:
        - "1.5"

    - name: "Section 1.6"
      ansible.builtin.import_tasks:
        file: "./sections/section_1.6.yaml"
      tags:
        - "1.6"

    - name: "Section 2.1"
      ansible.builtin.import_tasks:
        file: "./sections/section_2.1.yaml"
      tags:
        - "2.1"

    - name: "Section 2.2"
      ansible.builtin.import_tasks:
        file: "./sections/section_2.2.yaml"
      tags:
        - "2.2"

    - name: "Section 2.3"
      ansible.builtin.import_tasks:
        file: "./sections/section_2.3.yaml"
      tags: 
        - "2.3"

    - name: "Section 2.4"
      ansible.builtin.import_tasks:
        file: "./sections/section_2.4.yaml"
      tags:
        - "2.4"

    - name: "Section 3.1"
      ansible.builtin.import_tasks:
        file: "./sections/section_3.1.yaml"
      tags:
        - "3.1"

    - name: "Section 3.2"
      ansible.builtin.import_tasks:
        file: "./sections/section_3.2.yaml"
      tags:
        - "3.2"

    - name: "Section 3.3"
      ansible.builtin.import_tasks:
        file: "./sections/section_3.3.yaml"
      tags:
        - "3.3"
