        service:
          - "avahi-daemon.service"
          - "avahi-daemon.socket"
      when:
        - require_avahi_daemon == "yes"
        - run_avahi_daemon == "no"

    - name: "Uninstalling avahi-daemon..."
      ansible.builtin.apt:
        name: "avahi-daemon"
        state: absent
        purge: true
      when: 
        require_avahi_daemon == "no"

    - name: "2.1.3 Ensure dhcp server services are not in use"
      ansible.builtin.include_tasks:
        file: "./tasks/mask_stop_service.yaml"
      vars:
        service:
          - "kea-dhcp-ddns-server.service"
          - "kea-dhcp4-server.service"
          - "kea-dhcp6-server.service"
      when:
        - require_dhcp == "yes"
        - run_dhcp == "no"

    - name: "Uninstalling kea..."
      ansible.builtin.apt:
        name: "kea"
        state: absent
        purge: true
