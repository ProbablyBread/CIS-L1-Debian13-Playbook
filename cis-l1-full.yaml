    - name: "2.1.8 Ensure message access server services are not in use"
      ansible.builtin.include_tasks:
        file: "./tasks/mask_stop_service.yaml"
      vars:
        service: 
          - "dovecot.socket"
          - "dovecot.service"
      when:
        - require_pop3 == "yes"or require_imap == "yes"
        - run_pop3 == "no"
        - run_imap == "no"

    - name: "Uninstalling dovecot-imapd..."
