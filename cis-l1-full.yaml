- name: CIS Debian Linux 13 (Trixie) Benchmark v1.0 Server L1
  hosts: localhost
  vars_files:
    - "./options/kernel_module_options.yaml"
    - "./options/fs_options.yaml"
    - "./options/bootloader_options.yaml"
    - "./options/coredump_options.yaml"
    - "./options/motd_options.yaml"
    - "./options/service_options.yaml"

  tasks:
    - name: "Assert Options..."
      ansible.builtin.include_tasks:
        file: "./tasks/assert_options.yaml"

    - name: "1.1.1.1 Ensure cramfs kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "cramfs"

    - name: "1.1.1.2 Ensure freevxfs kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "freevxfs"

    - name: "1.1.1.3 Ensure hfs kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "hfs"

    - name: "1.1.1.4 Ensure hfsplus kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "hfsplus"

    - name: "1.1.1.5 Ensure jffs2 kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "jffs2"

    - name: "1.1.1.6 Ensure overlay kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "overlay"
      when:
        - require_overlay | lower == "no"

    - name: "1.1.1.7 Ensure squashfs kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "squashfs"
      when:
        - require_squashfs | lower == "no"

    - name: "1.1.1.8 Ensure udf kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "udf"
      when:
        - require_udf | lower == "no"

    - name: "1.1.1.9 Ensure firewire-core kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "firewire_core"

    - name: "1.1.1.10 Ensure usb-storage kernel module is not available"
      ansible.builtin.include_tasks:
        file: "./tasks/disable_kernel_module.yaml"
      vars:
        kernel_module: "usb_storage"
    
    - name: "1.1.2.1 Ensure /tmp is tmpfs or separate partition, and nodev, noexec, and nosuid is set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_tmpfs_partition.yaml"
      vars:
        fs: "/tmp"
        size: "{{ tmp_size }}"

    - name: "1.1.2.2 Ensure /dev/shm is tmpfs or separate partition, and nodev, noexec, and nosuid is set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_tmpfs_partition.yaml"
      vars:
        fs: "/dev/shm"
        size: "{{ shm_size }}"

    - name: "1.1.2.3 Ensure /home has nodev and nosuid set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_fs_partition.yaml"
      vars:
        fs: "{{ home_device }}"
        mountpoint: "{{ home_mount }}"
        type: "{{ fs_type }}"
      when:
        - is_home_partition | lower == "yes"

    - name: "1.1.2.4 Ensure /var has nodev and nosuid set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_fs_partition.yaml"
      vars:
        fs: "{{ var_device }}"
        mountpoint: "{{ var_mount }}"
        type: "{{ fs_type }}"
      when:
        - is_var_partition | lower == "yes"

    - name: "1.1.2.5 Ensure /var/tmp has nodev and nosuid set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_fs_partition_noexec.yaml"
      vars:
        fs: "{{ var_tmp_device }}"
        mountpoint: "{{ var_tmp_mount }}"
        type: "{{ fs_type }}"
      when:
        - is_var_tmp_partition | lower == "yes"

    - name: "1.1.2.6 Ensure /var/log has nodev and nosuid set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_fs_partition_noexec.yaml"
      vars:
        fs: "{{ var_log_device }}"
        mountpoint: "{{ var_log_mount }}"
        type: "{{ fs_type }}"
      when:
        - is_var_log_partition | lower == "yes"

    - name: "1.1.2.7 Ensure /var/log/audit has nodev and nosuid set"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_fs_partition_noexec.yaml"
      vars:
        fs: "{{ var_log_audit_device }}"
        mountpoint: "{{ var_log_audit_mount }}"
        type: "{{ fs_type }}"
      when:
        - is_var_log_audit_partition | lower == "yes"
    
    - name: "1.2.1.4/1.2.1.3 Ensure access to /etc/apt/trusted.gpg.d is configured"
      ansible.builtin.file:
        path: "/etc/apt/trusted.gpg.d"
        state: directory
        recurse: yes
        owner: root
        group: root
        mode: "u=rwX,g=rX,o=rX"

    - name: "1.2.1.5/1.2.1.6 Ensure access to /etc/apt/auth.conf.d is configured"
      ansible.builtin.file:
        path: "/etc/apt/auth.conf.d"
        state: directory
        recurse: yes
        owner: root
        group: root
        mode: "u=rwX,g=rX,o="

    - name: "1.2.1.7/1.2.1.3 Ensure access to /usr/share/keyrings is configured"
      ansible.builtin.file:
        path: "/usr/share/keyrings"
        state: directory
        recurse: yes
        owner: root
        group: root
        mode: "u=rwX,g=rX,o=rX"

    - name: "1.2.1.8/1.2.1.9 Ensure access to /etc/apt/sources.list.d is configured"
      ansible.builtin.file:
        path: "/etc/apt/sources.list.d"
        state: directory
        recurse: yes
        owner: root
        group: root
        mode: "u=rwX,g=rX,o=rX"
    
    - name: "1.3.1.1 Ensure apparmor packages are installed"
      ansible.builtin.apt:
        name: "apparmor"
        state: present

    - name: "1.3.1.2 Ensure apparmor is enabled"
      register: aa_enabled
      ansible.builtin.lineinfile:
        path: "/etc/default/grub"
        regexp: ^(GRUB_CMDLINE_LINUX=.*)apparmor=0(.*$)
        line: \1apparmor=1 security=apparmor\2
        backrefs: true

    - name: "1.4.1 Ensure bootloader password is set"
      register: bootloader_pw
      ansible.builtin.lineinfile:
        path: "/etc/grub.d/40_custom"
        regexp: ^set superusers=.*\npassword_pbkdf2.*$
        line: "set superusers={{ bootloader_user }}\npassword_pbkdf2 {{ bootloader_user }} {{ bootloader_pbkdf2 }}"
        insertafter: EOF
        state: present

    - name: "Disabling bootloader password on boot..."
      register: bootloader_pw_disabled
      ansible.builtin.lineinfile:
        path: "/etc/grub.d/10_linux"
        regexp: ^CLASS="--class gnu-linux --class gnu --class os.*"$
        line: CLASS="--class gnu-linux --class gnu --class os --unrestricted"
      when: bootloader_password_required == false

    - name: "Enabling bootloader password on boot..."
      register: bootloader_pw_enabled
      ansible.builtin.lineinfile:
        path: "/etc/grub.d/10_linux"
        regexp: ^CLASS="--class gnu-linux --class gnu --class os.*"
        line: CLASS="--class gnu-linux --class gnu --class os"
      when: bootloader_password_required == true
        
    - name: "Regenerating bootloader configuration..."
      ansible.builtin.command: update-grub
      when: aa_enabled.changed or bootloader_pw.changed or bootloader_pw_disabled.changed or bootloader_pw_enabled.changed

    - name: "1.4.2 Ensure access to bootloader config is configured"
      ansible.builtin.file: 
        path: "/boot/grub/grub.cfg"
        owner: root
        group: root
        mode: '0600'
    
    - name: "1.3.1.4 Ensure apparmor_restrict_unprivileged_unconfined is enabled"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "kernel.apparmor_restrict_unprivileged_unconfined"
        value: "1"      

    - name: "1.5.1 Ensure fs.protected_hardlinks is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "fs.protected_hardlinks"
        value: "1"

    - name: "1.5.2 Ensure fs.protected_symlinks is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "fs.protected_symlinks"
        value: "1"

    - name: "1.5.3 Ensure kernel.yama.ptrace_scope is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "kernel.yama.ptrace_scope"
        value: "2"

    - name: "1.5.4 Ensure fs.suid_dumpable is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "fs.suid_dumpable"
        value: "0"

    - name: "1.5.5 Ensure kernel.dmesg_restrict is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "kernel.dmesg_restrict"
        value: "1"

    - name: "1.5.8 Ensure kernel.kptr_restrict is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "kernel.kptr_restrict"
        value: "2"

    - name: "1.5.9 Ensure kernel.randomize_va_space is configured"
      ansible.builtin.include_tasks:
        file: "./tasks/configure_sysctl_settings.yaml"
      vars:
        setting: "kernel.randomize_va_space"
        value: "2"

    - name: "Attempting to restore prelink binaries..."
      ansible.builtin.command: prelink -ua
      ignore_errors: true
    
    - name: "1.5.6 Ensure prelink is not installed"
      ansible.builtin.apt:
        name: "prelink"
        state: absent
        purge: true

    - name: "1.5.7 Ensure Automatic Error Reporting is configured"
      ansible.builtin.apt:
        name: "apport"
        purge: true
        state: absent

    - name: "1.5.11 Ensure core file size is configured"
      ansible.builtin.lineinfile:
        path: "/etc/security/limits.d/99-cis-limits.conf"
        regex: ^\*\s+hard\s+core\s+\d$
        line: "*  hard  core  0"
        create: true
        state: present

    - name: "Uninstalling systemd-coredump..."
      ansible.builtin.apt:
        name: "systemd-coredump"
        state: absent
        purge: true
      when: require_coredump | lower == "no"

    - name: "Setting coredump settings..."
      ansible.builtin.include_tasks:
        file: "./tasks/configure_coredump_settings.yaml"
      when: require_coredump | lower == "yes"

    - name: "Removing /etc/motd..."
      ansible.builtin.file:
        path: "/etc/motd"
        state: absent
      when: require_motd | lower == "no"

    - name: "1.6.1 Ensure /etc/motd is configured"
      ansible.builtin.copy:
        dest: "/etc/motd"
        content: "{{ motd }}\n"
        owner: root
        group: root
        mode: '0644'
      when: require_motd | lower == "yes"

    - name: "1.6.2 Ensure /etc/issue is configured"
      ansible.builtin.copy:
        dest: "/etc/issue"
        content: "{{ issue }}\n"
        owner: root
        group: root
        mode: '0644'

    - name: "1.6.3 Ensure /etc/issue.net is configured"
      ansible.builtin.copy:
        dest: "/etc/issue.net"
        content: "{{ issue_net }}\n"
        owner: root
        group: root
        mode: '0644'

    - name: "2.1.1 Ensure autofs services are not in use"
      ansible.builtin.include_tasks:
        file: "./tasks/mask_stop_service.yaml"
      vars:
        service: "autofs.service"
      when:
        - require_autofs == "yes"
        - run_autofs == "no"

    - name: "Uninstalling autofs..."
      ansible.builtin.apt:
        name: "autofs"
        state: absent
        purge: true
      when: 
        require_autofs == "no"

    - name: "2.1.2 Ensure avahi daemon services are not in use"
      ansible.builtin.include_tasks:
        file: "./tasks/mask_stop_service.yaml"
