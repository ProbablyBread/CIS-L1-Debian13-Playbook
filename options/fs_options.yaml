tmp_size: "2G" # size of /tmp tmpfs
shm_size: "1G" # size of /dev/shm tmpfs

# partitioning options
fs_type: "ext4" # xfs, ext4, ext3, etc

is_home_partition: "yes"  # if /home is partitioned
home_device: "/dev/mapper/debian--vg-home"  # device of /home as per fstab
home_mount: "/home" # where the home partition is mounted

is_var_partition: "no"  # if /var is partitioned
var_device: "/dev/mapper/"  # device of /var as per fstab
var_mount: "/var" # where the var partition is mounted

is_var_tmp_partition: "yes" # if /var/tmp is partitioned
var_tmp_device: "/dev/mapper/debian--vg-var--tmp" # device of /var/tmp as per fstab
var_tmp_mount: "/var/tmp" # where the /var/tmp partition is mounted

is_var_log_partition: "yes" # if /var/log is partitioned
var_log_device: "/dev/mapper/debian--vg-var--log" # device of /var/log as per fstab
var_log_mount: "/var/log" # where the /var/log partition is mounted

is_var_log_audit_partition: "yes" # if /var/log/audit is partitioned
var_log_audit_device: "/dev/mapper/debian--vg-var--log--audit"  # device of /var/log/audit as per fstab
var_log_audit_mount: "/var/log/audit" # where the /var/log/audit partition is mounted
