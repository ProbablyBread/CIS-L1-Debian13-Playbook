# Configures the options pertaining IPv4 sysctl settings, including forwarding/redirect settings
# 
# require_ipv4_forwarding - if set to true, will skip 3.3.1.1, 3.3.1.2, 3.3.1.3, 3.3.1.4, 3.3.1.5 (only set to true if system is a router)
# require_ipv4_assym_routing - if this is set to true, will skip 3.3.1.12, 3.3.1.13. only applicable if require_ipv4_forwarding is set to true (only set to true if system is a router and uses asymmetrical routing)

require_ipv4_forwarding: false
require_ipv4_asym_routing: false
