# Configures crontab options
#
# require_cron - controls whether cron is installed on the system
# is_cron_deny - if set to false, uses /etc/cron.allow, otherwise uses /etc/cron.deny
# cron_allow - list of space separated usernames which are allowed to use the crontab command
# cron_deny - list of space separated usernames which are denied from using the crontab command

require_cron: true
is_cron_deny: false
cron_allow: "debian"
cron_deny: ""
