# Configure the time synchronisation daemon on the server. Depending on preference, either chrony or systemd-timesyncd can be selected
# Only set either chrony or systemd-timesyncd as active.
#
# use_systemd_timesyncd - sets whether to use systemd-timesyncd as the timesync daemon
# timesyncd_primary - configures the list of space separated primary NTP servers for systemd-timesyncd
# timesyncd_fallback - configures the list of space separated fallback NTP servers for systemd-timesyncd
#
# use_chrony - sets whether to use chrony as the timesync daemon
# chrony_pools - configures the pool of NTP servers for chrony, will show up as 
#   pool  <ntp-pool-1>  iburst  maxsources  <max-sources>
#   pool  <ntp-pool-2>  iburst  maxsources  <max-sources>
#   etc
# chrony_pools_max_sources - max number of NTP 
# chrony_servers - configures the list of space separated NTP servers for chrony, will show up as
#   server  <ntp-server-1> iburst
#   server  <ntp-server-2> iburst
#   etc
use_systemd_timesyncd: true
timesyncd_primary: "0.asia.pool.ntp.org 1.asia.pool.ntp.org 2.asia.pool.ntp.org 3.asia.pool.ntp.org"
timesyncd_fallback: ""

use_chrony: false
chrony_pools: "asia.pool.ntp.org pool.ntp.org"
chrony_pools_max_sources: 4
chrony_servers: "0.asia.pool.ntp.org 1.asia.pool.ntp.org"
