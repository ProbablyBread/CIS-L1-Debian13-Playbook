# Configure the time synchronisation daemon on the server. 
#
# use_systemd_timesyncd - sets whether to use systemd-timesyncd as the timesync daemon
# timesyncd_primary - configures the list of space separated primary NTP servers for systemd-timesyncd
# timesyncd_fallback - configures the list of space separated fallback NTP servers for systemd-timesyncd
#

use_systemd_timesyncd: true
timesyncd_primary: "0.asia.pool.ntp.org 1.asia.pool.ntp.org 2.asia.pool.ntp.org 3.asia.pool.ntp.org"
timesyncd_fallback: ""
