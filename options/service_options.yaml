# Configures whether services are required on the system
#
# require_* - sets if a service is required. if false, completely uninstalls the service
# run_* - sets if a service is required to be running, only effective if require_* is set to true. if false, masks and stops the service.
# 
# Note that there are exceptions to this for the MTA module.

require_autofs: false
run_autofs: false

require_avahi_daemon: false
run_avahi_daemon: false

# affects only the kea package
require_dhcp: false 
run_dhcp: false

# affects only the bind9 package
require_dns: false
run_dns: false

require_dnsmasq: false
run_dnsmasq: false

# affects only the vsftpd package
require_ftp: false
run_ftp: false

# affects only the slapd package
require_ldap: false
run_ldap: false

# affects only the dovecot packages
require_pop3: false
run_pop3: false
require_imap: false
run_imap: false

# affects only the nfs-kernel-server package
require_nfs: false
run_nfs: false

# affects only the ypserv package
require_nis: false
run_nis: false

require_cups: false
run_cups: false

require_rpcbind: false
run_rpcbind: false

require_rsync: false
run_rsync: false

require_samba: false
run_samba: false

require_snmp: false
run_snmp: false

# affects only the inetutils telnetd package
require_telnet: false
run_telnet: false

# affects only the tftpd-hpa package
require_tftp: false
run_tftp: false

# affects only the squid package
require_proxy: false
run_proxy: false

require_nginx: false
run_nginx: false
require_apache: false
run_apache: false

require_xinetd: false
run_xinetd: false

# affects only the postfix package
# if this is set to false, sets inet_interfaces to loopback-only
require_internet_mta: false
