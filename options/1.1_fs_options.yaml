# Configures partition options
#
# The following options have valid values of e.g. 1G, 1024M, 1024K, etc
# tmp_size - sets the size of the /tmp partition if it is a tmpfs partition, this option is ignored if /tmp is a logical partition
# shm_size - sets the size of the /dev/shm partition.
#
# fs_type - sets the filesystem type for all the following partitions, assumes all partitions are the same filesystem
# is_*_partition - set this to true if it is a partition
# *_device - if it is a partition, use the <file system> in /etc/fstab as the device
# *_mount - if it is a partition, set this to the <mount point> as per /etc/fstab 

tmp_size: "2G" 
shm_size: "1G" 

# partitioning options
fs_type: "ext4" 

is_tmp_partition: false
tmp_device: "/dev/mapper/debian--vg-tmp"
tmp_mount: "/tmp"

is_home_partition: false  
home_device: "/dev/mapper/debian--vg-home"
home_mount: "/home" 

is_var_partition: false  
var_device: "/dev/mapper/debian--vg-var"  
var_mount: "/var" 

is_var_tmp_partition: false 
var_tmp_device: "/dev/mapper/debian--vg-var--tmp" 
var_tmp_mount: "/var/tmp" 

is_var_log_partition: false 
var_log_device: "/dev/mapper/debian--vg-var--log" 
var_log_mount: "/var/log" 

is_var_log_audit_partition: false 
var_log_audit_device: "/dev/mapper/debian--vg-var--log--audit"
var_log_audit_mount: "/var/log/audit" 
