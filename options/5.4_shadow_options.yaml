# Configures options pertaining to the shadow password suite at /etc/login.defs 
#
# shadow_pass_max_days - controls the maximum password age
# shadow_pass_min_days - controls the minimum password age
# shadow_pass_warn_age - controls the number of days a warning is displayed to a user before their password expires
# shadow_inactive - controls how long (in days) can a user account be inactive for before it is disabled automatically
# is_root_breakglass - controls if the root user is to be used as a breakglass account for emergency access 
#   if set to true:
#     - root will not have a password expiry
#     - root will not be disabled after the shadow_inactive period passes
#     - if you are setting this to false, ensure that you have a separate breakglass account created after this playbook is run

shadow_pass_max_days: 365
shadow_pass_min_days: 1
shadow_pass_warn_age: 14
shadow_inactive: 45
is_root_breakglass: true
