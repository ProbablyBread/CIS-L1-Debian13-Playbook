- name: FS_SETTINGS
  hosts: localhost
  gather_facts: false
  become: true
  become_method: sudo

  tasks:
    - name: "Check apparmor"
      ansible.builtin.apt:
        name: "apparmor"
        state: present

    - name: "Check apparmor-utils"
      ansible.builtin.apt:
        name: "apparmor-utils"
        state: present

    - name: "Check apparmor disabled"
      ansible.builtin.replace:
        path: "./test.cfg"
        regexp: (^\s*linux.*)apparmor=0(.*$)
        replace: \1\2
