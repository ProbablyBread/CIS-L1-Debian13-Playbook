- name: "Reading {{ input_file }}..."
  ansible.builtin.slurp:
    src: "{{ input_file }}"
  register: file

- name: "Decoding content..."
  ansible.builtin.set_fact:
    list: "{{ (file.content | b64decode) | regex_findall('^([^:]+):([^:]+):\\d+:.*$', multiline=True) }}"

- name: "DEBUG"
  ansible.builtin.debug:
    msg: "{{ item[0] }} : {{ item[1] }}"
  loop: "{{ list }}"

- name: "Editing {{ input_file }}..."
  ansible.builtin.replace:
    path: "{{ input_file }}"
    regexp: '^{{ item[0] | regex_escape }}:[^:]+:(.*$)'
    replace: '{{ item[0] }}:x:\g<1>'
  when: item[1] != "x"
  loop: "{{ list }}"

- name: "Editing {{ output_file }}..."
  ansible.builtin.replace:
    path: "{{ output_file }}"
    regexp: '^{{ item[0] | regex_escape }}:[^:]+:(.*$)'
    replace: '{{ item[0] }}:{{ item[1] }}:\g<1>'
  when: item[1] != "x"
  loop: "{{ list }}"

