- name: "Ensuring chrony exists..."
  ansible.builtin.apt:
    name: "chrony"
    state: present

- name: "Ensuring systemd-timesyncd is masked..."
  ignore_errors: true
  ansible.builtin.systemd_service:
    name: "systemd-timesyncd.service"
    state: stopped
    enabled: false
    masked: true

- name: "Ensuring chrony is active..."
  ansible.builtin.systemd_service:
    name: "chrony.service"
    state: started
    enabled: true
    masked: false

- name: "Removing default chrony pools..."
  ansible.builtin.replace:
    path: "/etc/chrony/chrony.conf"
    regex: "{{ chrony_regex }}" 
    replace: # \1
  vars:
    chrony_regex:
      - ^(pool.*)$
      - ^(server.*)$

# figure out how to structure the variables and configure chronyd here

- name: "Restarting chrony..."
  ansible.builtin.systemd_service:
    name: "systemd-timesyncd.service"
    state: restarted
    enabled: true
    daemon-reload: true
    masked: false
  when: chrony_servers_changed.changed or chrony_pools_changed.changed
